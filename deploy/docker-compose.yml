version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: sub2api
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD:-redis}
    volumes:
      - redis_data:/data

  sub2api:
    image: weishaw/sub2api:latest
    restart: always
    depends_on:
      - postgres
      - redis
    ports:
      - "${PORT:-8080}:8080"
    environment:
      - RUN_MODE=simple
      - SIMPLE_MODE_CONFIRM=true
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DBNAME=sub2api
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD:-redis}
      - JWT_SECRET=${JWT_SECRET:-dreamapi_secret_key}
      - TOTP_ENCRYPTION_KEY=${TOTP_ENCRYPTION_KEY:-dreamapi_totp_key_must_be_64_hex_chars_xxxx}
      - ADMIN_EMAIL=${ADMIN_EMAIL:-admin@dreamapi.club}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123456}
      - ALLOW_REGISTER=true
      - SECURITY_URL_ALLOWLIST_ENABLED=false
      - SECURITY_URL_ALLOWLIST_ALLOW_INSECURE_HTTP=true

volumes:
  postgres_data:
  redis_data:
