version: '3.8'

services:
  # ========================================
  # 数据库与缓存层
  # ========================================
  postgres:
    image: postgres:15-alpine
    container_name: zero_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: sub2api
    volumes:
      - ./data/postgres_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5432:5432"

  redis:
    image: redis:7-alpine
    container_name: zero_redis
    restart: always
    command: redis-server --requirepass ${REDIS_PASSWORD}
    volumes:
      - ./data/redis_data:/data
    ports:
      - "6379:6379"

  # ========================================
  # 核心网关：Sub2API
  # ========================================
  sub2api:
    image: weishaw/sub2api:latest
    container_name: zero_sub2api
    restart: always
    depends_on:
      - postgres
      - redis
    ports:
      - "${SUB2API_PORT:-8080}:8080"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - POSTGRES_DBNAME=sub2api
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - JWT_SECRET=${JWT_SECRET}
      - TOTP_ENCRYPTION_KEY=${TOTP_ENCRYPTION_KEY}
      - ADMIN_EMAIL=${ADMIN_EMAIL}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD}

  # ========================================
  # 收银台：Sub2ApiPay
  # ========================================
  sub2apipay:
    image: touwaeriol/sub2apipay:latest
    container_name: zero_sub2apipay
    restart: always
    depends_on:
      - postgres
      - sub2api
    ports:
      - "${PAY_PORT:-3001}:3001"
    environment:
      - DATABASE_URL=postgresql://postgres:${POSTGRES_PASSWORD}@postgres:5432/sub2apipay?schema=public
      - SUB2API_BASE_URL=http://sub2api:8080
      - SUB2API_ADMIN_API_KEY=${SUB2API_ADMIN_API_KEY}
      - ADMIN_TOKEN=${PAY_ADMIN_TOKEN}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - PAYMENT_PROVIDERS=${PAYMENT_PROVIDERS}
      - PRODUCT_NAME=${PRODUCT_NAME}
      - PAY_HELP_TEXT=${PAY_HELP_TEXT}
      - PAY_HELP_IMAGE_URL=${PAY_HELP_IMAGE_URL}
      # 支付宝参数
      - ALIPAY_APP_ID=${ALIPAY_APP_ID}
      - ALIPAY_PRIVATE_KEY=${ALIPAY_PRIVATE_KEY}
      - ALIPAY_PUBLIC_KEY=${ALIPAY_PUBLIC_KEY}
      - ALIPAY_NOTIFY_URL=${NEXT_PUBLIC_APP_URL}/api/alipay/notify
      # 微信参数
      - WXPAY_APP_ID=${WXPAY_APP_ID}
      - WXPAY_MCH_ID=${WXPAY_MCH_ID}
      - WXPAY_PRIVATE_KEY=${WXPAY_PRIVATE_KEY}
      - WXPAY_CERT_SERIAL=${WXPAY_CERT_SERIAL}
      - WXPAY_API_V3_KEY=${WXPAY_API_V3_KEY}
      - WXPAY_PUBLIC_KEY_ID=${WXPAY_PUBLIC_KEY_ID}
      - WXPAY_NOTIFY_URL=${NEXT_PUBLIC_APP_URL}/api/wxpay/notify
