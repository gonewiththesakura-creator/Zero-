<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DreamAPI | 全球领先的 AI 接口分发平台</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', -apple-system, sans-serif; background-color: #000; color: #fff; scroll-behavior: smooth; }
        .glass { background: rgba(255, 255, 255, 0.03); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border: 1px solid rgba(255, 255, 255, 0.08); }
        .apple-gradient { background: linear-gradient(180deg, #fff 0%, #a1a1a6 100%); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .btn-primary { background: #fff; color: #000; transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        .modal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 100; align-items: center; justify-content: center; backdrop-filter: blur(10px); }
        .modal.active { display: flex; }
    </style>
</head>
<body class="overflow-x-hidden">
    <!-- 导航 -->
    <nav class="fixed w-full z-50 glass py-4 px-8 flex justify-between items-center">
        <div class="text-xl font-semibold tracking-tighter">DreamAPI<span class="text-blue-500">.</span></div>
        <div class="flex space-x-10 text-sm font-light text-gray-400">
            <a href="https://api.dreamapi.club/auth/register" class="text-white font-medium">注册账号</a>
        </div>
    </nav>

    <!-- Hero -->
    <section class="min-h-screen flex flex-col items-center justify-center text-center px-4 pt-20">
        <h1 class="text-5xl md:text-8xl font-bold tracking-tighter apple-gradient mb-8">从此，一个接口。</h1>
        <p class="text-lg md:text-2xl text-gray-500 max-w-2xl font-light mb-12">
            稳定分发 Gemini 1.5 Pro, Claude 3.5 Sonnet 与 GPT-4o。<br>让 AI 接入像呼吸一样简单。
        </p>
        <div class="flex flex-col md:flex-row space-y-4 md:space-y-0 md:space-x-6">
            <a href="https://api.dreamapi.club/auth/register" class="btn-primary px-10 py-4 rounded-full text-lg font-semibold">开始调用</a>
            <button onclick="document.getElementById('qrModal').classList.add('active')" class="glass px-10 py-4 rounded-full text-lg font-light hover:bg-white/10 transition">查看闲鱼套餐</button>
        </div>
    </section>

    <!-- 图表 -->
    <section class="py-32 px-8 max-w-6xl mx-auto">
        <div class="glass p-10 rounded-[2.5rem]">
            <h2 class="text-3xl font-bold mb-8">实时调用趋势</h2>
            <div class="h-[300px] w-full"><canvas id="usageChart"></canvas></div>
        </div>
    </section>

    <!-- 闲鱼弹窗 -->
    <div id="qrModal" class="modal" onclick="this.classList.remove('active')">
        <div class="glass p-8 rounded-[2.5rem] max-w-xs text-center" onclick="event.stopPropagation()">
            <h3 class="text-xl font-bold mb-4">DreamAPI 官方闲鱼</h3>
            <p class="text-gray-400 text-sm mb-6 font-light">保存下方图片并在闲鱼打开<br>或直接扫描购买兑换码</p>
            <div class="bg-white p-4 rounded-3xl mb-6">
                <img src="/xianyu.png" alt="闲鱼二维码" class="w-full h-auto" onerror="this.src='https://api.qrserver.com/v1/create-qr-code/?size=200x200&data=DreamAPI_Xianyu'">
            </div>
            <button onclick="document.getElementById('qrModal').classList.remove('active')" class="text-blue-500 text-sm font-medium">我知道了</button>
        </div>
    </div>

    <script>
        const ctx = document.getElementById('usageChart').getContext('2d');
        new Chart(ctx, {
            type: 'line',
            data: {
                labels: ['00:00','04:00','08:00','12:00','16:00','20:00','24:00'],
                datasets: [{
                    label: 'API Activity',
                    data: [15, 25, 55, 80, 100, 130, 160],
                    borderColor: '#3b82f6',
                    backgroundColor: 'rgba(59, 130, 246, 0.1)',
                    fill: true,
                    tension: 0.4,
                    borderWidth: 2,
                    pointRadius: 0
                }]
            },
            options: { responsive: true, maintainAspectRatio: false, plugins: { legend: { display: false } }, scales: { y: { display: false }, x: { grid: { display: false } } } }
        });
    </script>
</body>
</html>
